version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: workshopdb
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
  php:
    image: webdevops/php-apache:8.2
    container_name: php-app
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      WEB_DOCUMENT_ROOT: /var/www/html
    depends_on:
      - mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: admin123
    depends_on:
      - mysql

volumes:
  mysqldata:
